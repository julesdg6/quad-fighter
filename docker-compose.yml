version: "3.9"

services:
  quad-server:
    build: .
    image: quad-fighter-server
    container_name: quad-fighter-server
    restart: unless-stopped
    ports:
      - "${QUAD_SERVER_PORT:-7777}:7777"
    environment:
      QUAD_SERVER_HOST:  "0.0.0.0"
      QUAD_SERVER_PORT:  "${QUAD_SERVER_PORT:-7777}"
      QUAD_MAX_PLAYERS:  "${QUAD_MAX_PLAYERS:-4}"
      QUAD_TICK_RATE:    "${QUAD_TICK_RATE:-30}"
    # No display / graphical dependencies needed
    # Suitable for Unraid or any Docker host
